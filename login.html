<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Addiction Breaker - Sign In</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="urge" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#fbf8f2" />
  <link rel="apple-touch-icon" href="assets/app.png" />
  <link rel="icon" type="image/png" href="assets/app.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css?v=20260503q" />
</head>
<body class="login-body">
  <div class="app-frame login-frame">
    <div class="login-container">
      <div class="login-brand">
        <img class="login-logo" src="assets/Untitled_Artwork%2080.png" alt="Urge logo" />
        <h1 class="login-title">urge</h1>
      </div>
      
      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            placeholder="Enter your username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script src="app.js?v=20260503q"></script>
</body>
</html>
